<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ege Aydın — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-1: #2a2d31;
    --bg-2: #131417;
    --bg-3: #0a0a0c;
    --ink: #ffffff;
    --ink-soft: rgba(255,255,255,0.6);
    --ink-faint: rgba(255,255,255,0.36);
    --hair: rgba(255,255,255,0.08);
    --hair-strong: rgba(255,255,255,0.16);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; color: var(--ink); }
  html { background: var(--bg-2); scroll-behavior: smooth; }
  /* background-attachment:fixed yerine sabit katman — scroll'da repaint maliyetini sıfırlar */
  .bgfx {
    position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background:
      radial-gradient(120% 80% at 20% 0%, rgba(255,255,255,0.04), transparent 60%),
      radial-gradient(100% 80% at 80% 100%, rgba(255,255,255,0.025), transparent 50%),
      linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-3) 100%);
  }
  body {
    background: var(--bg-2);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-feature-settings: "ss01", "cv11";
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.011em;
    line-height: 1.5;
    overflow-x: hidden;
    cursor: none;
  }
  @media (pointer: coarse) { body { cursor: auto; } .cursor, .cursor-trail { display: none !important; } }
  ::selection { background: #fff; color: #0a0a0c; }
  a, button { cursor: none; }
  @media (pointer: coarse) { a, button { cursor: pointer; } }

  /* ============ CURSOR ============ */
  .cursor {
    position: fixed; top: 0; left: 0; pointer-events: none; z-index: 1000;
    width: 8px; height: 8px; border-radius: 50%;
    background: #fff; transform: translate(-50%,-50%);
    transition: width 280ms cubic-bezier(.2,.7,.2,1), height 280ms cubic-bezier(.2,.7,.2,1);
    mix-blend-mode: difference;
  }
  .cursor.hover { width: 64px; height: 64px; }
  .cursor-trail {
    position: fixed; top: 0; left: 0; pointer-events: none; z-index: 999;
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    transform: translate(-50%,-50%);
  }

  /* ============ SCROLL PROGRESS ============ */
  .scroll-progress {
    position: fixed; top: 0; left: 0; height: 2px; z-index: 60;
    background: linear-gradient(90deg, rgba(255,255,255,0.9), rgba(255,255,255,0.5));
    width: 0%;
  }

  /* ============ PRELOADER ============ */
  .pre {
    position: fixed; inset: 0; z-index: 200;
    background: linear-gradient(180deg, #1a1c1f 0%, #060608 100%);
    display: flex; align-items: flex-end; justify-content: space-between;
    padding: 48px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; letter-spacing: 0.1em;
    transition: transform 1000ms cubic-bezier(.85,0,.15,1) 150ms;
  }
  .pre.gone { transform: translateY(-100%); }
  .pre-center { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); text-align: center; }
  .pre-name {
    font-family: 'Instrument Serif', serif; font-style: italic;
    font-size: clamp(56px, 12vw, 160px); letter-spacing: -0.04em; line-height: 1;
    position: relative; overflow: hidden;
  }
  .pre-name .word {
    display: inline-block; overflow: hidden; vertical-align: bottom;
    padding-bottom: 0.1em; margin-bottom: -0.1em; /* descender ('y','g') kırpılmasın */
  }
  .pre-name .ltr {
    display: inline-block; opacity: 0;
    transform: translateY(120%) rotate(8deg); transform-origin: bottom left;
    animation: preLtr 850ms cubic-bezier(.2,.7,.2,1) forwards;
  }
  @keyframes preLtr { to { opacity: 1; transform: translateY(0) rotate(0); } }
  .pre-name::after {
    content: ""; position: absolute; top: 0; bottom: 0; width: 70px; left: -15%;
    background: linear-gradient(100deg, transparent, rgba(255,255,255,0.4), transparent);
    filter: blur(8px); transform: skewX(-14deg);
    opacity: 0; animation: preSweep 1100ms ease-in-out 1000ms forwards;
  }
  @keyframes preSweep { 0% { left: -15%; opacity: 1; } 100% { left: 110%; opacity: 0; } }
  .pre-num { margin-top: 24px; font-size: 11px; letter-spacing: 0.2em; opacity: 0.6; }

  /* ============ NAV ============ */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50; height: 64px;
    display: flex; align-items: center; justify-content: center;
    transition: background 300ms, backdrop-filter 300ms, border-color 300ms;
    border-bottom: 1px solid transparent;
  }
  .nav.scrolled {
    background: rgba(20,21,24,0.55);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    backdrop-filter: saturate(180%) blur(20px);
    border-bottom-color: rgba(255,255,255,0.08);
  }
  .nav-inner {
    width: 100%; max-width: 1240px; padding: 0 40px;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 13px; font-weight: 500;
  }
  .nav-logo {
    font-family: 'Instrument Serif', serif; font-style: italic;
    font-size: 22px; letter-spacing: -0.02em; text-decoration: none; color: var(--ink);
    white-space: nowrap;
  }
  .nav-links {
    display: flex; gap: 4px; align-items: center;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
    padding: 6px; border-radius: 999px;
  }
  .nav-link {
    color: var(--ink); text-decoration: none; padding: 8px 16px; border-radius: 999px;
    font-size: 13px; font-weight: 500; transition: background 240ms;
  }
  .nav-link:hover { background: rgba(255,255,255,0.1); }
  .nav-time {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-soft);
    letter-spacing: 0.05em; display: flex; align-items: center; gap: 6px;
  }
  .nav-time .dot {
    width: 6px; height: 6px; border-radius: 50%; background: #34c759;
    animation: pulse 1.8s ease-out infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(52,199,89,0.6); }
    100% { box-shadow: 0 0 0 10px rgba(52,199,89,0); }
  }
  @media (max-width: 980px) { .nav-time { display: none; } }
  @media (max-width: 720px) { .nav-link.hide-sm { display: none; } .nav-inner { padding: 0 24px; } }

  /* ============ SHARED ============ */
  .container { max-width: 1240px; margin: 0 auto; padding: 0 40px; }
  .eyebrow {
    font-size: 12px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-soft); font-family: 'JetBrains Mono', monospace;
    display: inline-flex; align-items: center; gap: 10px;
  }
  .eyebrow::before { content: ""; width: 18px; height: 1px; background: currentColor; }
  h1, h2, h3 { margin: 0; letter-spacing: -0.035em; line-height: 1.05; font-weight: 700; }
  p { margin: 0; }
  .serif { font-family: 'Instrument Serif', serif; font-weight: 400; font-style: italic; letter-spacing: -0.02em; }

  .reveal { opacity: 0; transform: translateY(36px); transition: opacity 1100ms cubic-bezier(.2,.7,.2,1), transform 1100ms cubic-bezier(.2,.7,.2,1); }
  .reveal.in { opacity: 1; transform: translateY(0); }
  .reveal.d1 { transition-delay: 80ms; } .reveal.d2 { transition-delay: 160ms; }
  .reveal.d3 { transition-delay: 240ms; } .reveal.d4 { transition-delay: 320ms; }
  .media-reveal { opacity: 0; transform: translateY(24px) scale(0.97); transition: opacity 1200ms cubic-bezier(.2,.7,.2,1), transform 1200ms cubic-bezier(.2,.7,.2,1); }
  .media-reveal.in { opacity: 1; transform: translateY(0) scale(1); }

  .mask-row {
    overflow: hidden; line-height: 1.05;
    padding-bottom: 0.12em; margin-bottom: -0.12em; /* descender'lar kırpılmasın */
  }
  .mask-row > span { display: inline-block; transform: translateY(115%); transition: transform 1100ms cubic-bezier(.2,.7,.2,1); }
  .mask-row.in > span { transform: translateY(0); }

  @media (prefers-reduced-motion: reduce) {
    .reveal, .media-reveal, .mask-row > span { opacity: 1; transform: none; transition: none; }
  }

  /* Buttons — magnetic */
  .btn-row { display: inline-flex; gap: 14px; flex-wrap: wrap; }
  .btn {
    appearance: none; border: 1px solid rgba(255,255,255,0.25);
    background: transparent; color: var(--ink);
    height: 52px; padding: 0 26px; border-radius: 999px;
    font: inherit; font-size: 14px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 10px; text-decoration: none;
    transition: color 240ms, border-color 240ms;
    position: relative; overflow: hidden;
    will-change: transform;
  }
  .btn::before {
    content: ""; position: absolute; inset: 0; background: #fff;
    transform: translateY(101%); transition: transform 480ms cubic-bezier(.85,0,.15,1); z-index: 0;
  }
  .btn:hover::before { transform: translateY(0); }
  .btn:hover { color: #0a0a0c; border-color: #fff; }
  .btn > * { position: relative; z-index: 1; }
  .btn.primary { background: #fff; color: #0a0a0c; border-color: #fff; }
  .btn.primary::before { background: transparent; }
  .btn.primary:hover { background: transparent; color: #fff; }
  .btn .arrow { transition: transform 320ms cubic-bezier(.2,.7,.2,1); display: inline-flex; }
  .btn:hover .arrow { transform: translateX(4px); }

  .ulink {
    color: var(--ink); text-decoration: none; position: relative;
    display: inline-block; padding-bottom: 2px;
  }
  .ulink::after {
    content: ""; position: absolute; left: 0; bottom: 0; height: 1px; width: 100%;
    background: currentColor; transform: scaleX(0); transform-origin: left center;
    transition: transform 420ms cubic-bezier(.2,.7,.2,1);
  }
  .ulink:hover::after { transform: scaleX(1); }
  .ulink .arrow { display: inline-block; transition: transform 320ms; margin-left: 4px; }
  .ulink:hover .arrow { transform: translate(3px,-3px); }

  /* ============ HERO ============ */
  .hero {
    min-height: 100vh; padding: 120px 0 60px;
    display: flex; flex-direction: column; justify-content: center;
    position: relative; overflow: hidden;
  }
  .hero-photo {
    position: absolute; inset: -10% 0; pointer-events: none;
    background-image: url('/hero-bg.jpg');
    background-size: cover; background-position: center;
    opacity: 0.55;
    will-change: transform;
  }
  .hero-photo::after {
    content: ""; position: absolute; inset: 0;
    background:
      linear-gradient(180deg, rgba(19,20,23,0.3) 0%, rgba(19,20,23,0.05) 35%, rgba(19,20,23,0.75) 85%, #131417 100%),
      radial-gradient(90% 70% at 50% 40%, transparent 40%, rgba(19,20,23,0.55) 100%);
  }
  .hero-inner { position: relative; z-index: 2; width: 100%; max-width: 1240px; padding: 0 40px; margin: 0 auto; }
  .hero-top {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 60px; flex-wrap: wrap; gap: 24px;
  }
  .hero-tag {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-soft);
    display: flex; flex-direction: column; gap: 6px; max-width: 240px;
  }
  .hero-tag > span { display: block; }
  .hero-tag .num { color: var(--ink-faint); }
  .hero-headline {
    font-size: clamp(56px, 11vw, 180px); font-weight: 700;
    letter-spacing: -0.05em; line-height: 0.92; margin: 0;
    text-shadow: 0 4px 60px rgba(0,0,0,0.5);
  }
  .hero-headline .row { display: block; }
  .hero-headline .serif { font-weight: 400; color: var(--ink-soft); }

  /* Rotator — crossfade: em-bazlı kaydırma yerine üst üste kelimeler (taşma/kaybolma yok) */
  .rotator { display: inline-block; position: relative; white-space: nowrap; }
  .rotator-ghost { visibility: hidden; }
  .rotator-word {
    position: absolute; left: 0; top: 0;
    opacity: 0; transform: translateY(0.35em);
    transition: opacity 460ms ease, transform 560ms cubic-bezier(.2,.7,.2,1);
    will-change: transform, opacity;
  }
  .rotator-word.on { opacity: 1; transform: translateY(0); }

  .hero-bottom { margin-top: 60px; display: grid; grid-template-columns: 1.2fr 1fr; gap: 60px; align-items: end; }
  .hero-sub {
    font-size: clamp(18px, 1.6vw, 22px); max-width: 460px; line-height: 1.45;
    font-family: 'Instrument Serif', serif; font-style: italic;
  }
  .hero-sub strong { font-family: 'Inter', sans-serif; font-style: normal; font-weight: 600; }
  .hero-actions { justify-self: end; display: flex; flex-direction: column; gap: 20px; align-items: flex-end; }
  @media (max-width: 860px) {
    .hero-bottom { grid-template-columns: 1fr; gap: 32px; }
    .hero-actions { justify-self: start; align-items: flex-start; }
  }

  .hero-marquee {
    margin-top: 100px;
    border-top: 1px solid var(--hair); border-bottom: 1px solid var(--hair);
    padding: 22px 0; overflow: hidden; position: relative; z-index: 2;
  }
  .marquee-track { display: flex; gap: 60px; width: max-content; will-change: transform; }
  .marquee-item {
    font-family: 'Instrument Serif', serif; font-style: italic;
    font-size: 22px; display: flex; align-items: center; gap: 60px; flex-shrink: 0;
  }
  .marquee-item::after { content: "✦"; font-style: normal; color: var(--ink-faint); font-family: sans-serif; font-size: 14px; }

  /* ============ SECTION HEAD ============ */
  section { position: relative; }
  .section-head { display: grid; grid-template-columns: 1fr 2fr; gap: 60px; align-items: end; margin-bottom: 100px; }
  .section-head h2 { font-size: clamp(40px, 6vw, 84px); letter-spacing: -0.04em; line-height: 1; }
  .section-head h2 .serif { color: var(--ink-soft); }
  @media (max-width: 860px) { .section-head { grid-template-columns: 1fr; gap: 24px; margin-bottom: 60px; } }

  /* ============ PROJECTS ============ */
  .projects { padding: 160px 0 80px; }
  .project {
    display: grid; grid-template-columns: 1fr 1fr; gap: 80px;
    align-items: center; padding: 80px 0; position: relative;
  }
  .project.reverse .tilt-wrap { order: 2; }
  .project.reverse .project-text { order: 1; }
  .project-index {
    position: absolute; top: 40px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--ink-faint); letter-spacing: 0.2em;
  }
  .project:not(.reverse) .project-index { left: 0; }
  .project.reverse .project-index { right: 0; }
  .project-text .eyebrow { margin-bottom: 24px; }
  .project-text h3 { font-size: clamp(28px, 3.8vw, 48px); margin-bottom: 24px; }
  .project-text h3 .serif { color: var(--ink-soft); }
  .project-text p { color: var(--ink-soft); font-size: 17px; line-height: 1.6; margin-bottom: 28px; max-width: 480px; }
  .project-stack { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 32px; }
  .chip {
    font-size: 12px; color: var(--ink-soft); font-family: 'JetBrains Mono', monospace;
    padding: 6px 14px; background: rgba(255,255,255,0.06);
    border: 1px solid var(--hair); border-radius: 999px;
    transition: background 240ms, color 240ms, border-color 240ms;
  }
  .chip:hover { background: #fff; color: #0a0a0c; border-color: #fff; }

  .tilt-wrap { perspective: 900px; }
  .project-media {
    aspect-ratio: 4/5; border-radius: 28px; overflow: hidden;
    background: rgba(255,255,255,0.04); border: 1px solid var(--hair);
    position: relative;
    transition: transform 200ms ease-out, box-shadow 400ms;
    transform-style: preserve-3d;
    will-change: transform;
  }
  .project-media:hover { box-shadow: 0 30px 80px rgba(0,0,0,0.5); }
  .project-media img { transition: transform 1200ms cubic-bezier(.2,.7,.2,1); }
  .project-media:hover img { transform: scale(1.05) !important; }
  .project-media-label {
    position: absolute; top: 24px; left: 24px; z-index: 2;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.15em; text-transform: uppercase;
    background: rgba(20,21,24,0.55); border: 1px solid rgba(255,255,255,0.12);
    -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
    padding: 6px 12px; border-radius: 999px;
  }
  @media (max-width: 860px) {
    .project, .project.reverse { grid-template-columns: 1fr; gap: 36px; padding: 56px 0; }
    .project.reverse .tilt-wrap { order: 1; }
    .project.reverse .project-text { order: 2; }
    .project-media { aspect-ratio: 4/3; }
    .project-index { display: none; }
  }

  /* ============ ABOUT ============ */
  .about { padding: 160px 0; position: relative; }
  .about::before {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(80% 60% at 50% 0%, rgba(255,255,255,0.04), transparent 60%);
    pointer-events: none;
  }
  .about .container { position: relative; }
  .about-grid { display: grid; grid-template-columns: 5fr 7fr; gap: 80px; align-items: start; margin-top: 80px; }
  .about-photo {
    aspect-ratio: 4/5; border-radius: 28px; overflow: hidden; position: relative;
    background: rgba(255,255,255,0.04); border: 1px solid var(--hair);
  }
  .about-text h2 { font-size: clamp(36px, 4.6vw, 60px); margin-bottom: 40px; }
  .about-text h2 .serif { color: var(--ink-soft); }
  .about-text p { color: var(--ink-soft); font-size: 18px; line-height: 1.65; margin-bottom: 22px; max-width: 560px; }
  .about-text p strong { color: var(--ink); font-weight: 500; }
  .about-stats {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px;
    margin-top: 56px; padding-top: 40px; border-top: 1px solid var(--hair);
  }
  .stat .n { font-size: clamp(36px, 4.5vw, 52px); font-weight: 600; letter-spacing: -0.035em; line-height: 1; }
  .stat .n .serif { color: var(--ink-soft); }
  .stat .l {
    font-size: 12px; color: var(--ink-faint); margin-top: 10px;
    font-family: 'JetBrains Mono', monospace; letter-spacing: 0.1em; text-transform: uppercase;
  }
  @media (max-width: 860px) {
    .about-grid { grid-template-columns: 1fr; gap: 48px; }
    .about-photo { max-width: 360px; }
    .about-stats { grid-template-columns: 1fr; gap: 24px; }
  }

  /* ============ SKILLS ============ */
  .skills { padding: 160px 0; }
  .skills-grid { display: grid; grid-template-columns: repeat(4, 1fr); margin-top: 24px; border-top: 1px solid var(--hair); }
  .skill {
    padding: 40px 24px; border-bottom: 1px solid var(--hair); border-right: 1px solid var(--hair);
    display: flex; flex-direction: column; gap: 16px;
    transition: background 360ms; position: relative; overflow: hidden;
  }
  .skill:nth-child(4n) { border-right: none; }
  .skill::before {
    content: ""; position: absolute; left: 0; top: 0; right: 0; height: 1px;
    background: #fff; transform: scaleX(0); transform-origin: left center;
    transition: transform 480ms cubic-bezier(.2,.7,.2,1);
  }
  .skill:hover { background: rgba(255,255,255,0.03); }
  .skill:hover::before { transform: scaleX(1); }
  .skill-glow {
    position: absolute; width: 220px; height: 220px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 70%);
    pointer-events: none; opacity: 0; transition: opacity 300ms;
    transform: translate(-50%,-50%);
  }
  .skill:hover .skill-glow { opacity: 1; }
  .skill-icon { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
  .skill h4 { margin: 0; font-size: 16px; font-weight: 600; }
  .skill p { font-size: 12px; color: var(--ink-soft); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.05em; }
  .skill .skill-num {
    position: absolute; top: 12px; right: 16px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--ink-faint); letter-spacing: 0.1em;
  }
  @media (max-width: 860px) {
    .skills-grid { grid-template-columns: repeat(2, 1fr); }
    .skill:nth-child(4n) { border-right: 1px solid var(--hair); }
    .skill:nth-child(2n) { border-right: none; }
  }

  /* ============ CONTACT ============ */
  .contact { padding: 220px 0 240px; text-align: center; position: relative; overflow: hidden; }
  .contact-photo {
    position: absolute; inset: -8% 0; pointer-events: none;
    background-image: url('/contact-bg.jpg');
    background-size: cover; background-position: center;
    opacity: 0.7; will-change: transform;
  }
  .contact-photo::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(180deg, #131417 0%, rgba(19,20,23,0.2) 25%, rgba(19,20,23,0.2) 75%, #0a0a0c 100%);
  }
  .contact .container { position: relative; z-index: 2; }
  .contact h2 {
    font-size: clamp(56px, 12vw, 180px); font-weight: 700;
    letter-spacing: -0.05em; line-height: 0.95; margin-bottom: 36px;
    text-shadow: 0 4px 60px rgba(0,0,0,0.6);
  }
  .contact h2 .serif { color: var(--ink-soft); font-weight: 400; }
  .contact p { color: var(--ink-soft); font-size: 19px; max-width: 540px; margin: 0 auto 48px; line-height: 1.6; }
  .contact-email {
    font-family: 'Instrument Serif', serif; font-style: italic;
    font-size: clamp(28px, 4vw, 44px); color: var(--ink); text-decoration: none;
    display: inline-block; position: relative; padding: 8px 0; margin-top: 24px;
  }
  .contact-email::after {

  <script>
    // === Preloader ===
    (function() {
      const numEl = document.getElementById('preNum');
      const pre = document.getElementById('pre');
      const start = performance.now();
      const dur = 1500;
      let finished = false;
      function finish() {
        if (finished) return;
        finished = true;
        pre.classList.add('gone');
        document.body.dataset.loaded = '1';
        window.dispatchEvent(new Event('siteLoaded'));
      }
      function tick(t) {
        const p = Math.min(1, (t - start) / dur);
        numEl.textContent = Math.floor(p * 100) + '%';
        if (p < 1) requestAnimationFrame(tick);
        else setTimeout(finish, 250);
      }
      requestAnimationFrame(tick);
      setTimeout(finish, 3200);
    })();

    // === Cursor ===
    (function() {
      const c = document.getElementById('cursor');
      const t = document.getElementById('cursor-trail');
      let mx = innerWidth/2, my = innerHeight/2, tx = mx, ty = my;
      addEventListener('mousemove', (e) => {
        mx = e.clientX; my = e.clientY;
        c.style.transform = `translate(${mx}px,${my}px) translate(-50%,-50%)`;
      });
      (function loop() {
        tx += (mx - tx) * 0.18; ty += (my - ty) * 0.18;
        t.style.transform = `translate(${tx}px,${ty}px) translate(-50%,-50%)`;
        requestAnimationFrame(loop);
      })();
      document.addEventListener('mouseover', (e) => {
        if (e.target.closest('a, button, .skill, .project-media, .chip')) c.classList.add('hover');
      });
      document.addEventListener('mouseout', (e) => {
        if (e.target.closest('a, button, .skill, .project-media, .chip')) c.classList.remove('hover');
      });
    })();

    // === Scroll progress ===
    (function() {
      const bar = document.getElementById('scrollProgress');
      addEventListener('scroll', () => {
        const h = document.documentElement;
        const p = h.scrollTop / (h.scrollHeight - h.clientHeight);
        bar.style.width = (p * 100) + '%';
      }, { passive: true });
    })();
  </script>

  <script type="text/babel" data-presets="react">
    const { useEffect, useRef, useState } = React;

    // ============ Reveal hook ============
    function useReveal() {
      useEffect(() => {
        const run = () => {
          const els = document.querySelectorAll('.reveal, .media-reveal, .mask-row');
          const io = new IntersectionObserver((entries) => {
            entries.forEach((e) => {
              if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
            });
          }, { threshold: 0.05, rootMargin: '0px 0px -4% 0px' });
          els.forEach((el) => io.observe(el));
        };
        if (document.body.dataset.loaded === '1') run();
        else window.addEventListener('siteLoaded', run, { once: true });
      }, []);
    }

    // ============ Parallax hook — translates el based on scroll ============
    function useParallax(ref, speed) {
      useEffect(() => {
        const el = ref.current;
        if (!el || matchMedia('(prefers-reduced-motion: reduce)').matches) return;
        let raf = null;
        const onScroll = () => {
          if (raf) return;
          raf = requestAnimationFrame(() => {
            raf = null;
            const r = el.parentElement.getBoundingClientRect();
            const progress = (r.top + r.height/2 - innerHeight/2) / innerHeight;
            el.style.transform = `translateY(${progress * speed * 100}px)`;
          });
        };
        onScroll();
        addEventListener('scroll', onScroll, { passive: true });
        return () => removeEventListener('scroll', onScroll);
      }, []);
    }

    // ============ Magnetic hook — pulls el toward cursor ============
    function useMagnetic(ref, strength = 0.3) {
      useEffect(() => {
        const el = ref.current;
        if (!el || matchMedia('(pointer: coarse)').matches) return;
        const onMove = (e) => {
          const r = el.getBoundingClientRect();
          const dx = e.clientX - (r.left + r.width/2);
          const dy = e.clientY - (r.top + r.height/2);
          el.style.transform = `translate(${dx*strength}px, ${dy*strength}px)`;
        };
        const onLeave = () => {
          el.style.transition = 'transform 500ms cubic-bezier(.2,.7,.2,1)';
          el.style.transform = 'translate(0,0)';
          setTimeout(() => { el.style.transition = ''; }, 500);
        };
        el.addEventListener('mousemove', onMove);
        el.addEventListener('mouseleave', onLeave);
        return () => { el.removeEventListener('mousemove', onMove); el.removeEventListener('mouseleave', onLeave); };
      }, []);
    }

    function MagneticBtn({ href, className, onClick, download, children }) {
      const ref = useRef(null);
      useMagnetic(ref, 0.25);
      return (
        <a ref={ref} href={href} className={className} onClick={onClick} download={download}>
          {children}
        </a>
      );
    }

    // ============ Count-up stat ============
    function CountUp({ to, suffix = '', duration = 1600 }) {
      const ref = useRef(null);
      const [val, setVal] = useState(0);
      useEffect(() => {
        const el = ref.current;
        const io = new IntersectionObserver((entries) => {
          if (!entries[0].isIntersecting) return;
          io.disconnect();
          const start = performance.now();
          const tick = (t) => {
            const p = Math.min(1, (t - start) / duration);
            const eased = 1 - Math.pow(1 - p, 3);
            setVal(Math.round(eased * to));
            if (p < 1) requestAnimationFrame(tick);
          };
          requestAnimationFrame(tick);
        }, { threshold: 0.5 });
        io.observe(el);
        return () => io.disconnect();
      }, []);
      return <span ref={ref}>{val}{suffix}</span>;
    }

    // ============ Nav ============
    function Nav() {
      const [scrolled, setScrolled] = useState(false);
      const [time, setTime] = useState('');
      useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 16);
        onScroll();
        addEventListener('scroll', onScroll, { passive: true });
        const tick = () => {
          const d = new Date();
          setTime('IST ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'Europe/Istanbul' }));
        };
        tick();
        const i = setInterval(tick, 30000);
        return () => { removeEventListener('scroll', onScroll); clearInterval(i); };
      }, []);
      const go = (id) => (e) => {
        e.preventDefault();
        const el = document.getElementById(id);
        if (el) window.scrollTo({ top: el.offsetTop - 40, behavior: 'smooth' });
      };
      return (
        <nav className={`nav ${scrolled ? 'scrolled' : ''}`}>
          <div className="nav-inner">
            <a href="#top" className="nav-logo" onClick={go('top')}>Ege Aydın</a>
            <div className="nav-links">
              <a href="#work" className="nav-link" onClick={go('work')}>Work</a>
              <a href="#about" className="nav-link hide-sm" onClick={go('about')}>About</a>
              <a href="#skills" className="nav-link hide-sm" onClick={go('skills')}>Stack</a>
              <a href="#contact" className="nav-link" onClick={go('contact')}>Contact</a>
            </div>
            <div className="nav-time">
              <span className="dot"></span>
              <span>{time || 'IST'}</span>
            </div>
          </div>
        </nav>
      );
    }

    // ============ Rotator — crossfade ============
    function Rotator({ words, interval = 2200 }) {
      const [i, setI] = useState(0);
      useEffect(() => {
        const id = setInterval(() => setI((p) => (p + 1) % words.length), interval);
        return () => clearInterval(id);
      }, [words.length, interval]);
      const longest = words.reduce((a, b) => (b.length > a.length ? b : a));
      return (
        <span className="rotator">
          <span className="rotator-ghost">{longest}</span>
          {words.map((w, k) => (
            <span key={k} className={`rotator-word ${k === i ? 'on' : ''}`}>{w}</span>
          ))}
        </span>
      );
    }

    // ============ Velocity marquee — speeds up with scroll ============
    function VelocityMarquee({ items }) {
      const trackRef = useRef(null);
      useEffect(() => {
        const track = trackRef.current;
        if (!track) return;
        let x = 0, vel = 0, lastY = scrollY, raf;
        const onScroll = () => {
          vel += Math.min(Math.abs(scrollY - lastY) * 0.06, 6);
          lastY = scrollY;
        };
        addEventListener('scroll', onScroll, { passive: true });
        const loop = () => {
          vel *= 0.94;
          x -= 0.6 + vel;
          const half = track.scrollWidth / 2;
          if (-x >= half) x += half;
          track.style.transform = `translateX(${x}px)`;
          raf = requestAnimationFrame(loop);
        };
        loop();
        return () => { removeEventListener('scroll', onScroll); cancelAnimationFrame(raf); };
      }, []);
      return (
        <div className="marquee-track" ref={trackRef}>
          {[0,1].map((n) => (
            <React.Fragment key={n}>
              {items.map((it, k) => <span className="marquee-item" key={k}>{it}</span>)}
            </React.Fragment>
          ))}
        </div>
      );
    }

      // Parallax + mouse drift on generated bg
      useEffect(() => {
        const el = bgRef.current;

        const apply = () => {

        const onMouse = (e) => {
          mx = (e.clientX / innerWidth - 0.5) * -18;
          my = (e.clientY / innerHeight - 0.5) * -12;
          if (!raf) raf = requestAnimationFrame(apply);
        };
        addEventListener('scroll', onScroll, { passive: true });
        addEventListener('mousemove', onMouse);
        return () => { removeEventListener('scroll', onScroll); removeEventListener('mousemove', onMouse); };
      }, []);
      useEffect(() => {

                      <span>See the work</span><span className="arrow">→</span>

    // ============ Tilt media — 3D follows cursor ============
    function TiltMedia({ children, label }) {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el || matchMedia('(pointer: coarse)').matches) return;
        const onMove = (e) => {
          const r = el.getBoundingClientRect();
          const px = (e.clientX - r.left) / r.width - 0.5;
          const py = (e.clientY - r.top) / r.height - 0.5;
          el.style.transform = `rotateY(${px * 7}deg) rotateX(${py * -7}deg)`;
        };
        const onLeave = () => {
          el.style.transition = 'transform 700ms cubic-bezier(.2,.7,.2,1)';
          el.style.transform = 'rotateY(0) rotateX(0)';
          setTimeout(() => { el.style.transition = 'transform 200ms ease-out'; }, 700);
        };
        el.addEventListener('mousemove', onMove);
        el.addEventListener('mouseleave', onLeave);
        return () => { el.removeEventListener('mousemove', onMove); el.removeEventListener('mouseleave', onLeave); };
      }, []);
      return (
        <div className="tilt-wrap media-reveal">
          <div className="project-media" ref={ref}>
            {children}
            <span className="project-media-label">{label}</span>
          </div>
        </div>
      );
    }

    // Inner parallax image — drifts inside its frame while scrolling
    function ParallaxImg({ src, alt, position = 'center' }) {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el || matchMedia('(prefers-reduced-motion: reduce)').matches) return;
        let raf = null;
        const onScroll = () => {
          if (raf) return;
          raf = requestAnimationFrame(() => {
            raf = null;
            const r = el.parentElement.getBoundingClientRect();
            if (r.bottom < -120 || r.top > innerHeight + 120) return; // ekran dışı: hesaplama yok
            const progress = (r.top + r.height/2 - innerHeight/2) / innerHeight;
            el.style.transform = `translateY(${progress * -30}px) scale(1.12)`;
          });
        };
        onScroll();
        addEventListener('scroll', onScroll, { passive: true });
        return () => removeEventListener('scroll', onScroll);
      }, []);
      return (
        <img ref={ref} src={src} alt={alt} loading="lazy" decoding="async"
          style={{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover', objectPosition: position, display:'block', willChange:'transform' }}/>
      );

        img: '/iau.jpg', label: 'IAU · 03',

        img: null, label: 'ARÇELİK · 04',

    // Arçelik — marka tipografisi SVG (logo görseli yatay olduğundan dikey kartta tipografik yorum)

    function About() {

    function Skill({ s, i }) {
      const ref = useRef(null);
      const glowRef = useRef(null);
      useEffect(() => {
        const el = ref.current, glow = glowRef.current;
        if (!el || matchMedia('(pointer: coarse)').matches) return;
        const onMove = (e) => {
          const r = el.getBoundingClientRect();
          glow.style.left = (e.clientX - r.left) + 'px';
          glow.style.top = (e.clientY - r.top) + 'px';
        };
        el.addEventListener('mousemove', onMove);
        return () => el.removeEventListener('mousemove', onMove);
      }, []);
      return (
        <div className="skill reveal" ref={ref} style={{ transitionDelay: `${(i % 4) * 80}ms` }}>
          <div className="skill-glow" ref={glowRef}></div>
          <span className="skill-num">{String(i+1).padStart(2,'0')}</span>
          <div className="skill-icon">{s.icon}</div>
          <h4>{s.name}</h4>
          <p>{s.note}</p>
        </div>
      );
    }

    function Skills() {
      return (
        <section className="skills" id="skills">

    // ============ Contact ============
    function Contact() {
      const bgRef = useRef(null);
      useEffect(() => {
        const el = bgRef.current;
        if (!el || matchMedia('(prefers-reduced-motion: reduce)').matches) return;
        let raf = null;
        const onScroll = () => {
          if (raf) return;
          raf = requestAnimationFrame(() => {
            raf = null;
            const r = el.parentElement.getBoundingClientRect();
            if (r.bottom < -120 || r.top > innerHeight + 120) return;
            const progress = Math.max(0, Math.min(1, 1 - r.top / innerHeight));
            el.style.transform = `scale(${1.15 - progress * 0.12}) translateY(${(1-progress) * 40}px)`;
          });
        };
        onScroll();
        addEventListener('scroll', onScroll, { passive: true });
        return () => removeEventListener('scroll', onScroll);
      }, []);
      return (
        <section className="contact" id="contact">
          <div className="contact-photo" ref={bgRef}></div>
          <div className="container">
            <div className="eyebrow reveal" style={{ justifyContent: 'center' }}>Let's talk</div>

              <a className="ulink" href="tel:+905388319554">+90 538 831 95 54</a>
            </div>
          </div>
        </section>
      );
    }
