<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ege Aydın — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-1: #2a2d31;   /* anthracite */
    --bg-2: #131417;   /* near-black */
    --bg-3: #0a0a0c;   /* black */
    --ink: #ffffff;
    --ink-soft: rgba(255,255,255,0.6);
    --ink-faint: rgba(255,255,255,0.36);
    --hair: rgba(255,255,255,0.08);
    --hair-strong: rgba(255,255,255,0.16);
    --accent: #ffffff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; color: var(--ink); }
  html { background: var(--bg-2); }
  body {
    background:
      radial-gradient(120% 80% at 20% 0%, rgba(255,255,255,0.04), transparent 60%),
      radial-gradient(100% 80% at 80% 100%, rgba(255,255,255,0.025), transparent 50%),
      linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-3) 100%);
    background-attachment: fixed;
  }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-feature-settings: "ss01", "cv11";
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    letter-spacing: -0.011em;
    line-height: 1.5;
    overflow-x: hidden;
    cursor: none;
  }
  @media (pointer: coarse) { body { cursor: auto; } .cursor { display: none !important; } }
  ::selection { background: #ffffff; color: #0a0a0c; }
  a, button { cursor: none; }
  @media (pointer: coarse) { a, button { cursor: pointer; } }

  /* ============ CUSTOM CURSOR ============ */
  .cursor {
    position: fixed; top: 0; left: 0; pointer-events: none; z-index: 1000;
    width: 8px; height: 8px; border-radius: 50%;
    background: #ffffff;
    transform: translate(-50%, -50%);
    transition: width 280ms cubic-bezier(.2,.7,.2,1), height 280ms cubic-bezier(.2,.7,.2,1),
                background 280ms ease, mix-blend-mode 100ms;
    mix-blend-mode: difference;
  }
  .cursor.hover {
    width: 64px; height: 64px;
    background: #ffffff;
  }
  .cursor-trail {
    position: fixed; top: 0; left: 0; pointer-events: none; z-index: 999;
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    transform: translate(-50%, -50%);
    transition: transform 80ms linear, opacity 200ms;
  }

  /* ============ PRELOADER ============ */
  .pre {
    position: fixed; inset: 0; z-index: 200;
    background: linear-gradient(180deg, #1a1c1f 0%, #060608 100%);
    color: #fff;
    display: flex; align-items: flex-end; justify-content: space-between;
    padding: 48px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; letter-spacing: 0.1em;
    transition: transform 1100ms cubic-bezier(.85,0,.15,1) 200ms;
  }
  .pre.gone { transform: translateY(-100%); }
  .pre-center {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }
  .pre-name {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(56px, 12vw, 160px);
    font-weight: 400;
    font-style: italic;
    letter-spacing: -0.04em;
    line-height: 1;
    color: #fff;
    overflow: hidden;
  }
  .pre-name .word {
    display: inline-block; overflow: hidden;
    vertical-align: bottom;
  }
  .pre-name .word span {
    display: inline-block;
    transform: translateY(110%);
    animation: preRise 900ms cubic-bezier(.2,.7,.2,1) forwards;
  }
  .pre-name .word.w2 span { animation-delay: 200ms; }
  @keyframes preRise { to { transform: translateY(0); } }
  .pre-num {
    margin-top: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.2em; opacity: 0.6;
  }

  /* ============ NAV ============ */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    height: 64px;
    display: flex; align-items: center; justify-content: center;
    transition: background 300ms ease, backdrop-filter 300ms ease, border-color 300ms ease;
    border-bottom: 1px solid transparent;
  }
  .nav.scrolled {
    background: rgba(20, 21, 24, 0.55);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    backdrop-filter: saturate(180%) blur(20px);
    border-bottom-color: rgba(255,255,255,0.08);
  }
  .nav-inner {
    width: 100%; max-width: 1240px; padding: 0 40px;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 13px; font-weight: 500;
  }
  .nav-logo {
    font-family: 'Instrument Serif', serif; font-style: italic;
    font-size: 22px; letter-spacing: -0.02em;
    text-decoration: none; color: var(--ink);
    white-space: nowrap;
  }
  .nav-links {
    display: flex; gap: 4px; align-items: center;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
    padding: 6px;
    border-radius: 999px;
  }
  .nav-link {
    color: var(--ink); text-decoration: none;
    padding: 8px 16px; border-radius: 999px;
    font-size: 13px; font-weight: 500;
    transition: background 240ms ease, color 240ms ease;
  }
  .nav-link:hover { background: rgba(255,255,255,0.1); }
  .nav-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--ink-soft);
    letter-spacing: 0.05em;
    display: flex; align-items: center; gap: 6px;
  }
  .nav-time .dot {
    width: 6px; height: 6px; border-radius: 50%; background: #34c759;
    box-shadow: 0 0 0 0 rgba(52,199,89,0.6);
    animation: pulse 1.8s ease-out infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(52,199,89,0.6); }
    100% { box-shadow: 0 0 0 10px rgba(52,199,89,0); }
  }
  @media (max-width: 980px) { .nav-time { display: none; } }
  @media (max-width: 720px) {
    .nav-link.hide-sm { display: none; }
    .nav-inner { padding: 0 24px; }
  }

  /* ============ SHARED ============ */
  .container { max-width: 1240px; margin: 0 auto; padding: 0 40px; }
  .eyebrow {
    font-size: 12px; font-weight: 500; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--ink-soft);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    display: inline-flex; align-items: center; gap: 10px;
  }
  .eyebrow::before {
    content: ""; width: 18px; height: 1px; background: currentColor;
  }
  h1, h2, h3 { margin: 0; letter-spacing: -0.035em; line-height: 1.05; font-weight: 700; }
  p { margin: 0; }
  .serif { font-family: 'Instrument Serif', serif; font-weight: 400; font-style: italic; letter-spacing: -0.02em; }

  /* Reveal */
  .reveal { opacity: 0; transform: translateY(36px); transition: opacity 1100ms cubic-bezier(.2,.7,.2,1), transform 1100ms cubic-bezier(.2,.7,.2,1); }
  .reveal.in { opacity: 1; transform: translateY(0); }
  .reveal.d1 { transition-delay: 80ms; }
  .reveal.d2 { transition-delay: 160ms; }
  .reveal.d3 { transition-delay: 240ms; }
  .reveal.d4 { transition-delay: 320ms; }
  .reveal.d5 { transition-delay: 400ms; }
  .reveal.d6 { transition-delay: 480ms; }

  /* Word-by-word mask reveal */
  .mask-row { overflow: hidden; line-height: 1.05; }
  .mask-row > span {
    display: inline-block;
    transform: translateY(110%);
    transition: transform 1100ms cubic-bezier(.2,.7,.2,1);
    will-change: transform;
  }
  .mask-row.in > span { transform: translateY(0); }

  @media (prefers-reduced-motion: reduce) {
    .reveal, .mask-row > span { opacity: 1; transform: none; transition: none; }
  }

  /* Buttons */
  .btn-row { display: inline-flex; gap: 14px; flex-wrap: wrap; }
  .btn {
    appearance: none; border: 1px solid rgba(255,255,255,0.25);
    background: transparent; color: var(--ink);
    height: 52px; padding: 0 26px; border-radius: 999px;
    font: inherit; font-size: 14px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 10px;
    text-decoration: none;
    transition: transform 240ms cubic-bezier(.2,.7,.2,1), background 240ms ease, border-color 240ms ease, color 240ms ease;
    position: relative; overflow: hidden;
  }
  .btn::before {
    content: ""; position: absolute; inset: 0;
    background: #ffffff;
    transform: translateY(101%);
    transition: transform 480ms cubic-bezier(.85,0,.15,1);
    z-index: 0;
  }
  .btn:hover::before { transform: translateY(0); }
  .btn:hover { color: #0a0a0c; border-color: #ffffff; }
  .btn > * { position: relative; z-index: 1; }
  .btn.primary { background: #ffffff; color: #0a0a0c; border-color: #ffffff; }
  .btn.primary::before { background: transparent; }
  .btn.primary:hover { background: transparent; color: #ffffff; border-color: #ffffff; }
  .btn .arrow { transition: transform 320ms cubic-bezier(.2,.7,.2,1); display: inline-flex; }
  .btn:hover .arrow { transform: translateX(4px); }

  /* underline link */
  .ulink {
    color: var(--ink); text-decoration: none; position: relative;
    display: inline-block; padding-bottom: 2px;
  }
  .ulink::after {
    content: ""; position: absolute; left: 0; bottom: 0; height: 1px;
    width: 100%; background: currentColor;
    transform: scaleX(0); transform-origin: left center;
    transition: transform 420ms cubic-bezier(.2,.7,.2,1);
  }
  .ulink:hover::after { transform: scaleX(1); }
  .ulink .arrow { display: inline-block; transition: transform 320ms cubic-bezier(.2,.7,.2,1); margin-left: 4px; }
  .ulink:hover .arrow { transform: translate(3px, -3px); }

  /* ============ HERO ============ */
  .hero {
    min-height: 100vh; padding: 120px 0 60px;
    display: flex; flex-direction: column; justify-content: center;
    position: relative; overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0; pointer-events: none;
    background-image:
      radial-gradient(circle at var(--mx, 50%) var(--my, 30%),
        rgba(255,255,255,0.08) 0%,
        rgba(255,255,255,0.03) 30%,
        transparent 60%);
    transition: background 600ms ease;
  }
  .hero-grid {
    position: absolute; inset: 0; pointer-events: none; opacity: 0.7;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 80px 80px;
    mask-image: radial-gradient(circle at center, #000 30%, transparent 80%);
    -webkit-mask-image: radial-gradient(circle at center, #000 30%, transparent 80%);
  }
  .hero-inner {
    position: relative; z-index: 2;
    width: 100%; max-width: 1240px; padding: 0 40px;
    margin: 0 auto;
  }
  .hero-top {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 60px;
    flex-wrap: wrap; gap: 24px;
  }
  .hero-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-soft);
    display: flex; flex-direction: column; gap: 6px;
    max-width: 220px;
  }
  .hero-tag > span { display: block; }
  .hero-tag .num { font-size: 11px; color: var(--ink-faint); }

  .hero-headline {
    font-size: clamp(56px, 11vw, 180px);
    font-weight: 700;
    letter-spacing: -0.05em;
    line-height: 0.92;
    margin: 0;
  }
  .hero-headline .row { display: block; }
  .hero-headline .serif {
    font-weight: 400;
    color: var(--ink-soft);
  }

  /* Word rotator */
  .rotator {
    display: inline-block; position: relative;
    vertical-align: baseline;
    height: 1em;
    overflow: hidden;
  }
  .rotator-track {
    display: inline-block;
    transition: transform 720ms cubic-bezier(.85,0,.15,1);
  }
  .rotator-word {
    display: block; line-height: 1;
  }

  .hero-bottom {
    margin-top: 60px;
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 60px;
    align-items: end;
  }
  .hero-sub {
    font-size: clamp(18px, 1.6vw, 22px);
    color: var(--ink);
    max-width: 460px;
    line-height: 1.45;
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-weight: 400;
    letter-spacing: -0.01em;
  }
  .hero-sub strong { font-family: 'Inter', sans-serif; font-style: normal; font-weight: 600; }
  .hero-actions { justify-self: end; display: flex; flex-direction: column; gap: 20px; align-items: flex-end; }
  @media (max-width: 860px) {
    .hero-bottom { grid-template-columns: 1fr; gap: 32px; }
    .hero-actions { justify-self: start; align-items: flex-start; }
  }

  .hero-marquee {
    margin-top: 100px;
    border-top: 1px solid var(--hair);
    border-bottom: 1px solid var(--hair);
    padding: 22px 0;
    overflow: hidden;
    position: relative;
  }
  .marquee-track {
    display: flex; gap: 60px;
    animation: marquee 38s linear infinite;
    width: max-content;
  }
  .marquee-item {
    font-family: 'Instrument Serif', serif; font-style: italic;
    font-size: 22px; color: var(--ink);
    display: flex; align-items: center; gap: 60px; flex-shrink: 0;
  }
  .marquee-item::after {
    content: "✦"; font-style: normal; color: var(--ink-faint);
    font-family: sans-serif; font-size: 14px;
  }
  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* ============ SECTION HEAD ============ */
  section { position: relative; }
  .section-head {
    display: grid; grid-template-columns: 1fr 2fr; gap: 60px;
    align-items: end; margin-bottom: 100px;
  }
  .section-head h2 {
    font-size: clamp(40px, 6vw, 84px);
    letter-spacing: -0.04em;
    line-height: 1;
  }
  .section-head h2 .serif { color: var(--ink-soft); }
  .section-head .sub {
    color: var(--ink-soft); font-size: 15px; line-height: 1.5;
    max-width: 280px;
  }
  @media (max-width: 860px) {
    .section-head { grid-template-columns: 1fr; gap: 24px; margin-bottom: 60px; }
  }

  /* ============ PROJECTS ============ */
  .projects { padding: 160px 0 80px; }

  .project {
    display: grid; grid-template-columns: 1fr 1fr; gap: 80px;
    align-items: center; padding: 80px 0;
    position: relative;
  }
  .project.reverse .project-media { order: 2; }
  .project.reverse .project-text { order: 1; }

  .project-index {
    position: absolute; top: 40px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--ink-faint);
    letter-spacing: 0.2em;
  }
  .project:not(.reverse) .project-index { left: 0; }
  .project.reverse .project-index { right: 0; }

  .project-text .eyebrow { margin-bottom: 24px; }
  .project-text h3 {
    font-size: clamp(28px, 3.8vw, 48px);
    letter-spacing: -0.035em; line-height: 1.05;
    margin-bottom: 24px;
  }
  .project-text h3 .serif {
    color: var(--ink-soft);
    font-weight: 400;
  }
  .project-text p {
    color: var(--ink-soft); font-size: 17px; line-height: 1.6; margin-bottom: 28px;
    max-width: 480px;
  }
  .project-stack {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 32px;
  }
  .chip {
    font-size: 12px; color: var(--ink-soft);
    font-family: 'JetBrains Mono', monospace;
    padding: 6px 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--hair);
    border-radius: 999px;
    transition: background 240ms ease, color 240ms ease, border-color 240ms ease;
  }
  .chip:hover { background: #ffffff; color: #0a0a0c; border-color: #ffffff; }

  .project-media {
    aspect-ratio: 4/5;
    border-radius: 28px;
    overflow: hidden;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--hair);
    position: relative;
    transition: transform 700ms cubic-bezier(.2,.7,.2,1);
  }
  .project-media .art {
    width: 100%; height: 100%; display: block;
    transition: transform 1200ms cubic-bezier(.2,.7,.2,1);
  }
  .project-media:hover .art { transform: scale(1.04); }

  .project-media-label {
    position: absolute; top: 24px; left: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
    color: #ffffff;
    background: rgba(20,21,24,0.55);
    border: 1px solid rgba(255,255,255,0.12);
    -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
    padding: 6px 12px; border-radius: 999px;
  }

  /* Mask reveal for project media */
  .clip-reveal { clip-path: inset(100% 0 0 0); transition: clip-path 1400ms cubic-bezier(.85,0,.15,1); }
  .clip-reveal.in { clip-path: inset(0 0 0 0); }

  @media (max-width: 860px) {
    .project, .project.reverse {
      grid-template-columns: 1fr; gap: 36px; padding: 56px 0;
    }
    .project.reverse .project-media { order: 1; }
    .project.reverse .project-text { order: 2; }
    .project-media { aspect-ratio: 4/3; }
    .project-index { display: none; }
  }

  /* ============ ABOUT ============ */
  .about { padding: 160px 0; position: relative; }
  .about::before {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(80% 60% at 50% 0%, rgba(255,255,255,0.04), transparent 60%);
    pointer-events: none;
  }
  .about .container { position: relative; }
  .about-grid {
    display: grid; grid-template-columns: 5fr 7fr; gap: 80px;
    align-items: start; margin-top: 80px;
  }
  .about-photo {
    aspect-ratio: 4/5;
    border-radius: 28px;
    overflow: hidden;
    position: relative;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--hair);
  }
  .about-photo .ph-label {
    position: absolute; bottom: 20px; left: 20px;
    color: var(--ink-faint); font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .about-text h2 {
    font-size: clamp(36px, 4.6vw, 60px);
    margin-bottom: 40px;
    color: var(--ink);
  }
  .about-text h2 .serif {
    color: var(--ink-soft);
    font-weight: 400;
  }
  .about-text p {
    color: var(--ink-soft); font-size: 18px; line-height: 1.65;
    margin-bottom: 22px; max-width: 560px;
  }
  .about-text p strong { color: var(--ink); font-weight: 500; }
  .about-stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 40px; margin-top: 56px;
    padding-top: 40px; border-top: 1px solid var(--hair);
  }
  .stat .n {
    font-size: clamp(36px, 4.5vw, 52px); font-weight: 600;
    letter-spacing: -0.035em; line-height: 1;
    color: var(--ink);
  }
  .stat .n .serif { color: var(--ink-soft); }
  .stat .l {
    font-size: 12px; color: var(--ink-faint); margin-top: 10px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  @media (max-width: 860px) {
    .about-grid { grid-template-columns: 1fr; gap: 48px; }
    .about-photo { max-width: 360px; }
    .about-stats { grid-template-columns: 1fr; gap: 24px; }
  }

  /* ============ SKILLS ============ */
  .skills { padding: 160px 0; }
  .skills-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    margin-top: 24px;
    border-top: 1px solid var(--hair);
  }
  .skill {
    padding: 40px 24px;
    border-bottom: 1px solid var(--hair);
    border-right: 1px solid var(--hair);
    display: flex; flex-direction: column; gap: 16px;
    transition: background 360ms ease;
    position: relative;
  }
  .skill:nth-child(4n) { border-right: none; }
  .skill::before {
    content: ""; position: absolute; left: 0; top: 0; right: 0; height: 1px;
    background: #ffffff;
    transform: scaleX(0); transform-origin: left center;
    transition: transform 480ms cubic-bezier(.2,.7,.2,1);
  }
  .skill:hover { background: rgba(255,255,255,0.03); }
  .skill:hover::before { transform: scaleX(1); }
  .skill-icon {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink);
  }
  .skill h4 {
    margin: 0; font-size: 16px; font-weight: 600;
    letter-spacing: -0.01em;
  }
  .skill p {
    font-size: 12px; color: var(--ink-soft);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
  }
  .skill .skill-num {
    position: absolute; top: 12px; right: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--ink-faint);
    letter-spacing: 0.1em;
  }
  @media (max-width: 860px) {
    .skills-grid { grid-template-columns: repeat(2, 1fr); }
    .skill:nth-child(4n) { border-right: 1px solid var(--hair); }
    .skill:nth-child(2n) { border-right: none; }
  }

  /* ============ CONTACT ============ */
  .contact {
    padding: 200px 0 220px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .contact-bg {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05), transparent 60%);
  }

      </div>

    </div>
    <div>ISTANBUL · TR</div>
  </div>

  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script>
    // === Preloader counter ===
    (function() {
      const numEl = document.getElementById('preNum');
      const pre = document.getElementById('pre');
      let n = 0;
      const start = performance.now();
      const dur = 1800;
      let finished = false;
      function finish() {
        if (finished) return;
        finished = true;
        pre.classList.add('gone');
        document.body.dataset.loaded = '1';
        window.dispatchEvent(new Event('siteLoaded'));
      }
      function tick(t) {
        const p = Math.min(1, (t - start) / dur);
        n = Math.floor(p * 100);
        numEl.textContent = n + '%';
        if (p < 1) requestAnimationFrame(tick);
        else setTimeout(finish, 300);
      }
      requestAnimationFrame(tick);
      // Safety net: if rAF is throttled (inactive tab etc.), force-finish
      setTimeout(finish, 3500);
    })();

    // === Custom cursor ===
    (function() {
      const c = document.getElementById('cursor');
      const t = document.getElementById('cursor-trail');
      let mx = window.innerWidth/2, my = window.innerHeight/2;
      let tx = mx, ty = my;
      window.addEventListener('mousemove', (e) => {
        mx = e.clientX; my = e.clientY;
        c.style.transform = `translate(${mx}px, ${my}px) translate(-50%, -50%)`;
      });
      function loop() {
        tx += (mx - tx) * 0.18;
        ty += (my - ty) * 0.18;
        t.style.transform = `translate(${tx}px, ${ty}px) translate(-50%, -50%)`;
        requestAnimationFrame(loop);
      }
      loop();
      // hover detection
      document.addEventListener('mouseover', (e) => {
        if (e.target.closest('a, button, .skill, .project-media, .chip')) c.classList.add('hover');
      });
      document.addEventListener('mouseout', (e) => {
        if (e.target.closest('a, button, .skill, .project-media, .chip')) c.classList.remove('hover');
      });
    })();

    // === Hero spotlight follows mouse ===
    window.addEventListener('mousemove', (e) => {
      const hero = document.querySelector('.hero-bg');
      if (!hero) return;
      const r = hero.getBoundingClientRect();
      const x = ((e.clientX - r.left) / r.width) * 100;
      const y = ((e.clientY - r.top) / r.height) * 100;
      hero.style.setProperty('--mx', x + '%');
      hero.style.setProperty('--my', y + '%');
    });
  </script>

  <script type="text/babel" data-presets="react">
    const { useEffect, useRef, useState, useMemo } = React;

    // ============ Reveal hook ============
    function useReveal() {
      useEffect(() => {
        const run = () => {
          const els = document.querySelectorAll('.reveal, .mask-row, .clip-reveal');
          const io = new IntersectionObserver((entries) => {
            entries.forEach((e) => {
              if (e.isIntersecting) {
                e.target.classList.add('in');
                io.unobserve(e.target);
              }
            });
          }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
          els.forEach((el) => io.observe(el));
        };
        if (document.body.dataset.loaded === '1') run();
        else window.addEventListener('siteLoaded', run, { once: true });
      }, []);
    }

    // ============ Nav ============
    function Nav() {
      const [scrolled, setScrolled] = useState(false);
      const [time, setTime] = useState('');
      useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 16);
        onScroll();
        window.addEventListener('scroll', onScroll, { passive: true });
        const tick = () => {
          const d = new Date();
          const opts = { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'Europe/Istanbul' };
          setTime('IST ' + d.toLocaleTimeString('en-GB', opts));
        };
        tick();
        const i = setInterval(tick, 30000);
        return () => { window.removeEventListener('scroll', onScroll); clearInterval(i); };
      }, []);
      const go = (id) => (e) => {
        e.preventDefault();
        const el = document.getElementById(id);
        if (el) window.scrollTo({ top: el.offsetTop - 40, behavior: 'smooth' });
      };
      return (
        <nav className={`nav ${scrolled ? 'scrolled' : ''}`}>
          <div className="nav-inner">
            <a href="#top" className="nav-logo" onClick={go('top')}>Ege Aydın</a>

              <a href="#work" className="nav-link" onClick={go('work')}>Work</a>
              <a href="#about" className="nav-link hide-sm" onClick={go('about')}>About</a>
              <a href="#skills" className="nav-link hide-sm" onClick={go('skills')}>Stack</a>
              <a href="#contact" className="nav-link" onClick={go('contact')}>Contact</a>
            </div>
            <div className="nav-time">
              <span className="dot"></span>
              <span>{time || 'IST'}</span>
            </div>
          </div>
        </nav>
      );
    }

    // ============ Rotator ============
    function Rotator({ words, interval = 2200 }) {
      const [i, setI] = useState(0);
      // measure widest word for stable layout
      const trackRef = useRef(null);
      const [maxW, setMaxW] = useState(null);
      useEffect(() => {
        // measure
        const probe = document.createElement('span');
        const styles = getComputedStyle(trackRef.current || document.body);
        probe.style.position = 'absolute';
        probe.style.visibility = 'hidden';
        probe.style.whiteSpace = 'nowrap';
        probe.style.font = styles.font;
        probe.style.fontFamily = styles.fontFamily;
        probe.style.fontSize = styles.fontSize;
        probe.style.fontWeight = styles.fontWeight;
        probe.style.letterSpacing = styles.letterSpacing;
        document.body.appendChild(probe);
        let mw = 0;
        words.forEach((w) => {
          probe.textContent = w;
          mw = Math.max(mw, probe.getBoundingClientRect().width);
        });
        document.body.removeChild(probe);
        setMaxW(mw);
      }, []);
      useEffect(() => {
        const id = setInterval(() => setI((p) => (p + 1) % words.length), interval);
        return () => clearInterval(id);
      }, [words.length, interval]);
      return (
        <span className="rotator" style={{ width: maxW ? `${maxW}px` : 'auto', verticalAlign: 'bottom' }}>
          <span
            ref={trackRef}
            className="rotator-track"
            style={{ transform: `translateY(-${i}em)` }}
          >
            {words.map((w, k) => (
              <span className="rotator-word" key={k}>{w}</span>
            ))}
          </span>
        </span>
      );
    }
